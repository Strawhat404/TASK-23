server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed Brotli/gzip WASM/JS files when available
    gzip_static on;

    # Reverse-proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoints proxy
    location /health/ {
        proxy_pass http://backend:8000/health/;
    }

    # All routes fall back to index.html for client-side (Dioxus) routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively; never cache the HTML entry point
    location ~* \.(wasm|js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
